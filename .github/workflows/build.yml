name: 打包 SuperDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装依赖
        run: npm install
      - name: 构建前端
        run: npm run build
      - name: 打包
        run: npx electron-builder --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 压缩程序
        run: cd release && 7z a -tzip ../SuperDS-Portable.zip win-unpacked
      - name: 上传程序
        uses: actions/upload-artifact@v4
        with:
          name: SuperDS-Portable
          path: SuperDS-Portable.zip
          if-no-files-found: error

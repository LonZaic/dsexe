<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 480px;
      height: 90vh;
      border: 2px solid #333;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* 头部 */
    .header {
      border-bottom: 2px solid #333;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .dot {
      width: 10px; height: 10px;
      border: 2px solid #333;
      border-radius: 50%;
    }

    /* 消息区 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    /* 气泡 - 通用 */
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 85%;
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.ai { align-self: flex-start; }

    /* 头像 */
    .avatar {
      width: 32px; height: 32px;
      border: 2px solid #333;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: #fff;
    }
    .msg.user .avatar { border-color: #2563eb; color: #2563eb; }
    .msg.ai .avatar { border-color: #16a34a; color: #16a34a; }

    /* 气泡内容 */
    .bubble {
      border: 2px solid #333;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { border-color: #2563eb; }
    .msg.ai .bubble { border-color: #16a34a; }

    /* 底部输入 */
    .input-area {
      border-top: 2px solid #333;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      border: 2px solid #333;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .input-area input:focus { border-color: #2563eb; }
    .input-area button {
      border: 2px solid #333;
      background: #fff;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #333;
    }
    .input-area button:hover { background: #333; color: #fff; }

    /* 加载占位 */
    .typing .bubble {
      border-color: #999;
      color: #999;
    }
    .typing .bubble::after {
      content: " ⚡";
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <span class="dot"></span>
      AI Agent
    </div>

    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="avatar">🤖</div>
        <div class="bubble">你好！我是 AI 助手。<br />有什么需要帮忙的吗？</div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="输入消息..." autofocus />
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const avatar = role === 'user' ? '🧑' : '🤖';
      div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${text}</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg ai typing';
      div.id = 'typing';
      div.innerHTML = `<div class="avatar">🤖</div><div class="bubble">思考中</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      // 发送用户消息
      addMessage('user', text);
    // 清空输入框
      input.value = '';
      // 显示思考中
      showTyping();

      try {
        //等待拿到后端回复是吗？//等待后端返回响应
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        removeTyping();
        // 解析后端响应
        const data = await res.json();
        addMessage('ai', data.reply || '(无响应)');
      } catch (e) {
        removeTyping();
        addMessage('ai', '[连接后端失败] ' + e.message);
      }
    }
    // 点击发送按钮
    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
